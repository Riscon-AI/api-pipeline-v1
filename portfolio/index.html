<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>포트폴리오</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <div class="hero-content">
      <h1>나의 작품</h1>
      <nav>
        <ul>
          <li><a href="#about">About</a></li>
          <li><a href="#gallery">Gallery</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section id="about" class="section">
    <h2>About</h2>
    <p>여기에 자신의 소개를 적으세요. 예술 작업이나 프로젝트, 경력 등을 간략하게 정리합니다.</p>
  </section>

  <section id="gallery" class="section gallery">
    <h2>Gallery</h2>
    <div class="grid">
      <img src="https://picsum.photos/id/1015/600/400" alt="작품1">
      <img src="https://picsum.photos/id/1016/600/400" alt="작품2">
      <img src="https://picsum.photos/id/1018/600/400" alt="작품3">
      <img src="https://picsum.photos/id/1019/600/400" alt="작품4">
    </div>
  </section>

  <section id="contact" class="section">
    <h2>Contact</h2>
    <form id="contact-form">
      <input type="text" name="name" placeholder="Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <textarea name="message" placeholder="Message" required></textarea>
      <button type="submit">Send</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2025 My Portfolio</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
